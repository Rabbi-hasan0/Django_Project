<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .post-card { transition: transform 0.3s; border: none; border-radius: 15px; overflow: hidden; }
        .post-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .post-image { height: 200px; object-fit: cover; }
        .category-badge { position: absolute; top: 15px; left: 15px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold text-primary">Latest Posts</h1>
        <span class="badge bg-secondary">User: {{ request.user.username }}</span>
    </div>

    <div class="row">
        {% for post in posts %}
        <div class="col-md-4 mb-4">
            <div class="card post-card h-100">
                <span class="badge bg-info text-dark category-badge">{{ post.category.name }}</span>
                
                {% if post.post_image %}
                    <img src="{{ post.post_image.url }}" class="card-img-top post-image" alt="{{ post.title }}">
                {% else %}
                    <img src="https://via.placeholder.com/400x200?text=No+Image" class="card-img-top post-image">
                {% endif %}

                <div class="card-body">
                    <h5 class="card-title fw-bold">{{ post.title }}</h5>
                    <p class="card-text text-muted">
                        {{ post.content|truncatechars:100 }}
                    </p>
                </div>
                <div class="card-footer bg-white border-0 pb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-muted"><i class="far fa-calendar-alt"></i> {{ post.created_at|date:"M d, Y" }}</small>
                        <a href="#" class="btn btn-outline-primary btn-sm">Read More</a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
            <p class="lead">No posts found!</p>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
