<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .vh-100 { height: 100vh; }
        .error-container { text-align: center; }
        .error-code { font-size: 8rem; font-weight: 900; color: #dc3545; line-height: 1; }
        .lock-icon { font-size: 4rem; color: #6c757d; margin-bottom: 20px; }
    </style>
</head>
<body class="bg-light">

<div class="container d-flex align-items-center justify-content-center vh-100">
    <div class="error-container p-5 bg-white shadow-lg rounded-4">
        <div class="lock-icon">🔒</div>
        <h1 class="error-code">403</h1>
        <h2 class="fw-bold mb-3">Access Denied</h2>
        <p class="text-muted mb-4">
            Sorry, <strong>{{ request.user.username }}</strong>! You don't have permission to view this page.<br>
            Please contact your administrator for access.
        </p>
        <a href="{% url 'home' %}" class="btn btn-primary px-4 py-2 rounded-pill"> 
            Go Back Home
        </a>
    </div>
</div>

</body>
</html>
